<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrôle des caisses — Falret</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(150deg,#08235e 0%,#0d3494 35%,#1649b8 65%,#0b2e80 100%) fixed;background-attachment:fixed;min-height:100vh}
.topbar{background:rgba(255,255,255,0.97);backdrop-filter:blur(8px);padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.5);box-shadow:0 2px 12px rgba(0,0,0,0.15);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.bg-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.container{position:relative;z-index:1}
#vue-liste,#vue-detail{position:relative;z-index:1}
@keyframes bgfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes bgfloat2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes bgfloat3{0%,100%{transform:translateY(-5px)}50%{transform:translateY(7px)}}
.topbar h1{font-size:16px;font-weight:600;color:#1a1a1a}
.btn-logout{font-size:13px;color:#888;background:none;border:none;cursor:pointer}
.btn-back{border:none;background:#f0f0f0;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
.btn-back:hover{background:#e5e5e5}
.container{max-width:1400px;margin:0 auto;padding:1.5rem}
.mois-select{padding:6px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:white}

/* ── Liste ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.mc{background:white;border-radius:12px;padding:1rem;border:1px solid #eee}
.mc-label{font-size:12px;color:#888;margin-bottom:4px}
.mc-val{font-size:22px;font-weight:700}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:8px;border:1px solid #ddd;background:white;color:#888;font-size:13px;cursor:pointer}
.filter-btn.active{background:#1a1a1a;color:white;border-color:#1a1a1a}
.table-wrap{background:white;border-radius:14px;border:1px solid #eee;overflow-x:auto}
.tbl{min-width:900px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 14px;text-align:left;color:#888;font-weight:500;border-bottom:1px solid #eee;white-space:nowrap}
.tbl td{padding:10px 14px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#fafafa;cursor:pointer}
.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.b-ok{background:#dcfce7;color:#16a34a}
.b-warn{background:#fef9c3;color:#854d0e}
.b-err{background:#fee2e2;color:#dc2626}
.b-wait{background:#f0f0f0;color:#888}
.jt-btn{padding:4px 10px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #ddd;border-radius:6px;background:white;font-family:inherit}
.jt-btn.ok{background:#dcfce7;color:#16a34a;border-color:#86efac}
.jt-btn.warn{background:#fef9c3;color:#854d0e;border-color:#fde047}
.jt-btn.err{background:#fee2e2;color:#dc2626;border-color:#fca5a5}

/* ── Détail ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1rem}
.kpi{background:white;border-radius:12px;padding:.875rem 1rem;border:1px solid #eee}
.kpi-label{font-size:11px;color:#888;margin-bottom:3px}
.kpi-val{font-size:17px;font-weight:700}

/* Tabs */
.tabs{display:flex;background:white;border-radius:12px;border:1px solid #eee;overflow:hidden;margin-bottom:1.25rem}
.tab{flex:1;padding:12px 4px;border:none;background:none;font-size:12px;cursor:pointer;color:#888;border-bottom:3px solid transparent;transition:all .12s;font-family:inherit;font-weight:500}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600;background:#fafafa}
.tab:hover:not(.active){background:#f5f5f5;color:#555}
.tab-content{display:none}
.tab-content.active{display:block}

/* Cards */
.card{background:white;border-radius:14px;padding:1.25rem;margin-bottom:1rem;border:1px solid #eee}
.card-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:.25rem}
.section-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.75rem}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.info-cell{background:#f8f8f8;border-radius:10px;padding:.75rem 1rem}
.info-cell-label{font-size:11px;color:#888;margin-bottom:3px}
.info-cell-val{font-size:14px;font-weight:600;color:#1a1a1a}

/* Tables inline */
.tbl-inline{width:100%;border-collapse:collapse;font-size:13px}
.tbl-inline th{padding:8px 12px;text-align:left;color:#888;font-weight:500;border-bottom:1px solid #eee;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.tbl-inline td{padding:9px 12px;border-bottom:1px solid #f5f5f5;color:#1a1a1a}
.tbl-inline tr:last-child td{border-bottom:none}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f8f8;border-radius:8px;margin-top:.75rem;font-weight:600;font-size:14px}

/* Dep card */
.dep-card{background:white;border:1.5px solid #f0bfbf;border-radius:12px;margin-bottom:.75rem;overflow:hidden}
.dep-card-header{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;background:#d97070;border-bottom:none}
.dep-num-badge{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.4)}
.dep-body{padding:1rem;background:white}
.dep-info-row{display:flex;gap:1.5rem;margin-bottom:.75rem;flex-wrap:wrap}
.dep-info-item{display:flex;flex-direction:column;gap:2px}
.dep-info-item label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.dep-info-item span{font-size:13px;color:#1a1a1a;font-weight:500}
.dep-cat-line{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#fef6f6;border-radius:7px;margin-bottom:5px;border-left:3px solid #f0bfbf}
.dep-cat-line span:first-child{font-size:13px;color:#8a4a4a}
.dep-cat-line span:last-child{font-size:13px;font-weight:700;color:#1a1a1a}

/* Part/cotis cards */
.part-card{background:white;border:1.5px solid #6ee7b7;border-radius:12px;overflow:hidden;margin-bottom:.75rem}
.part-card-header{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;background:#d1fae5;border-bottom:1.5px solid #6ee7b7}
.part-num{width:24px;height:24px;border-radius:50%;background:#059669;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.part-card-body{padding:1rem}
.cotis-card{background:white;border:1.5px solid #fbbf24;border-radius:12px;overflow:hidden;margin-bottom:.75rem}
.cotis-card-header{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;background:#fef3c7;border-bottom:1.5px solid #fbbf24}
.cotis-num{width:24px;height:24px;border-radius:50%;background:#d97706;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}

/* Justif */
.justif-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;background:#dbeafe;color:#1d4ed8;padding:3px 8px;border-radius:6px;cursor:pointer;border:none;margin:2px;font-family:inherit}
.justif-link:hover{background:#bfdbfe}
.no-justif{font-size:11px;background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:6px;display:inline-block}
.justif-ok{background:#f0fdf4;border-radius:8px;padding:8px 10px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:12px;color:#0F6E56}

/* Comptage */
.comptage-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.comptage-tbl{width:100%;border-collapse:collapse;font-size:13px}
.comptage-tbl th{padding:7px 10px;text-align:left;color:#888;font-size:11px;font-weight:500;border-bottom:1px solid #eee}
.comptage-tbl td{padding:7px 10px;border-bottom:1px solid #f5f5f5;color:#1a1a1a}
.comptage-tbl tr:last-child td{border-bottom:none}
.comptage-tbl td.zero{color:#ccc}
.comptage-sub{display:flex;justify-content:space-between;padding:7px 10px;background:#f0f0f0;border-radius:6px;margin-top:6px;font-size:13px;font-weight:600}
.ecart-box{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:.75rem}
.ecart-parfait{background:#dcfce7;color:#16a34a}
.ecart-pos{background:#dcfce7;color:#16a34a}
.ecart-neg{background:#fef9c3;color:#854d0e}

/* Obs */
.obs-bloc{background:#fffbeb;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;color:#92400e}

/* CEGI */
.cegi-block{background:#f8f8f8;border-radius:10px;padding:1rem;font-family:'SF Mono',Monaco,monospace;font-size:11px;overflow-x:auto}
.crow{display:grid;grid-template-columns:78px 32px 90px 72px 32px 82px 1fr 66px 66px;gap:2px;padding:2px 0}
.crow.hdr{border-bottom:1px solid #eee;padding-bottom:5px;margin-bottom:4px}
.crow.cadj{background:#fef9c3;border-radius:3px}
.crow.clast{background:#dbeafe;border-radius:3px}
.cc{padding:1px 3px;font-size:11px;color:#1a1a1a;overflow:hidden;white-space:nowrap}
.ch{padding:1px 3px;font-size:11px;color:#888;font-weight:500}
.editable{border:none;background:transparent;font-family:inherit;font-size:11px;color:#1a1a1a;width:100%;outline:none}
.editable:focus{background:white;border-radius:3px;padding:0 2px}
.adj-row{display:grid;grid-template-columns:90px 1fr 60px 90px 80px 30px;gap:5px;align-items:center;padding:6px 8px;background:#f8f8f8;border-radius:8px;margin-bottom:5px}
.adj-inp{font-size:12px;border:1px solid #eee;border-radius:6px;padding:4px 6px;width:100%;font-family:inherit;background:white}
.add-adj-btn{width:100%;padding:7px;border:1px dashed #ddd;border-radius:8px;background:none;color:#888;font-size:12px;cursor:pointer;text-align:left;margin-top:4px;font-family:inherit}
.note-area{width:100%;border:1px solid #eee;border-radius:10px;padding:8px 12px;font-size:13px;resize:vertical;min-height:70px;font-family:inherit}
.btn-copy{background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-valider{background:#1a1a1a;color:white;border:none;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-valider:hover{background:#333}
.btn-valider.devalider{background:#dc2626}
.btn-valider.devalider:hover{background:#b91c1c}
.empty{text-align:center;color:#aaa;font-size:13px;padding:2rem;font-style:italic}
.locked-banner{background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#1d4ed8;display:flex;align-items:center;gap:8px}
/* ── Éditeur comptable ── */
.edit-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:200;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px 0}
.edit-modal-overlay.open{display:flex}
.edit-modal{background:white;border-radius:18px;padding:1.75rem;width:96%;max-width:1000px;margin:auto}
.edit-section{margin-bottom:1.5rem}
.edit-section-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.75rem;padding:6px 10px;border-radius:6px;display:flex;align-items:center;gap:8px}
.est-gray{background:#f5f5f5;color:#555}
.est-blue{background:#dbeafe;color:#1d4ed8}
.est-red{background:#fff0f0;color:#b91c1c}
.est-green{background:#d1fae5;color:#059669}
.est-purple{background:#f3e8ff;color:#7c3aed}
.est-amber{background:#fef3c7;color:#d97706}
.edit-table{width:100%;border-collapse:collapse;font-size:13px}
.edit-table th{padding:7px 10px;text-align:left;background:#f8f8f8;border-bottom:2px solid #eee;font-size:11px;font-weight:600;color:#555;text-transform:uppercase;white-space:nowrap}
.edit-table td{padding:5px 6px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.edit-table tr:last-child td{border-bottom:none}
.edit-inp{width:100%;border:1px solid #e0e0e0;border-radius:7px;padding:6px 9px;font-size:13px;font-family:inherit;background:white;outline:none}
.edit-inp:focus{border-color:#1649b8;box-shadow:0 0 0 2px rgba(22,73,184,0.1)}
.edit-add-btn{margin-top:.5rem;padding:6px 12px;border:1.5px dashed #ddd;border-radius:8px;background:none;color:#888;font-size:12px;cursor:pointer;font-family:inherit}
.edit-del-btn{border:none;background:none;color:#dc2626;cursor:pointer;font-size:18px;padding:0 4px;line-height:1}
.edit-summary{background:#f8fafc;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;border:1px solid #e2e8f0}
.edit-sum-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#555}
.edit-sum-total{display:flex;justify-content:space-between;padding:8px 0 0;border-top:2px solid #1649b8;margin-top:6px;font-size:15px;font-weight:700;color:#1649b8}
.btn-save-edit{background:#059669;color:white;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-save-edit:hover{background:#047857}
</style>
</head>

<div class="bg-layer">

  </div>
  <!-- Personnes haut-droite -->
  <div style="position:absolute;top:-10px;right:-40px;opacity:.09;animation:bgfloat2 12s ease-in-out infinite 2s">
    <svg width="230" height="78" viewBox="0 0 220 80" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">

      <circle cx="138" cy="11" r="10" fill="white" stroke="none"/><line x1="138" y1="21" x2="138" y2="49"/><line x1="110.5" y1="43" x2="138" y2="31"/><line x1="138" y1="31" x2="165.5" y2="43"/><line x1="138" y1="49" x2="126" y2="70"/><line x1="138" y1="49" x2="150" y2="70"/>
      <circle cx="193" cy="11" r="10" fill="white" stroke="none"/><line x1="193" y1="21" x2="193" y2="49"/><line x1="165.5" y1="43" x2="193" y2="31"/><line x1="193" y1="31" x2="221" y2="43"/><line x1="193" y1="49" x2="181" y2="70"/><line x1="193" y1="49" x2="205" y2="70"/>

  <!-- Livre haut-gauche -->

  <!-- Calculatrice/carnet compta — haut droite -->
  <div style="position:absolute;top:5%;right:14%;opacity:.09;animation:bgfloat3 9s ease-in-out infinite 2s">
    <svg width="38" height="50" viewBox="0 0 26 34" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"><rect x="1" y="1" width="24" height="32" rx="2"/><rect x="4" y="4" width="18" height="8" rx="1"/><circle cx="7" cy="18" r="2" fill="white" stroke="none"/><circle cx="13" cy="18" r="2" fill="white" stroke="none"/><circle cx="19" cy="18" r="2" fill="white" stroke="none"/><circle cx="7" cy="25" r="2" fill="white" stroke="none"/><circle cx="13" cy="25" r="2" fill="white" stroke="none"/><circle cx="19" cy="25" r="2" fill="white" stroke="none"/></svg>

  </div>
  <!-- Tasse café bas-droite -->
  <div style="position:absolute;bottom:8%;right:5%;opacity:.08;animation:bgfloat2 14s ease-in-out infinite 1s">
    <svg width="48" height="54" viewBox="0 0 36 44" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M4 12 L7 34 L29 34 L32 12 Z"/><path d="M32 17 Q42 17 42 23 Q42 29 32 29"/><ellipse cx="18" cy="36.5" rx="16" ry="3.5"/><path d="M10 8 Q12 4 10 1"/><path d="M18 8 Q20 4 18 1"/><path d="M26 8 Q28 4 26 1"/></svg>
  </div>
  <!-- Note musicale gauche -->
  <div style="position:absolute;top:40%;left:2%;opacity:.07;animation:bgfloat3 10s ease-in-out infinite 3s">
    <svg width="30" height="44" viewBox="0 0 22 32" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><ellipse cx="6" cy="27" rx="6" ry="4" fill="white" stroke="none"/><line x1="12" y1="27" x2="12" y2="2"/><line x1="12" y1="2" x2="22" y2="6"/><line x1="22" y1="6" x2="22" y2="10"/></svg>

}

async function init(){
  const stored=localStorage.getItem('falret_user');
  if(!stored){window.location.href='index.html';return;}

function initMoisSelect(){
  const sel=document.getElementById('mois-select');
  const now=new Date();
  const noms=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const val=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
    const opt=document.createElement('option');
    opt.value=val;opt.textContent=noms[d.getMonth()]+' '+d.getFullYear();
    sel.appendChild(opt);
  }
}

// ── Vue liste ─────────────────────────────────────────────────────────────────

function totalComptage(c){
  if(!c||!c.comptage)return null;
  let t=0;
  if(c.comptage.billets)BILLETS.forEach(v=>{t+=v*(c.comptage.billets[String(v)]||0);});
  if(c.comptage.pieces)PIECES.forEach(v=>{t=Math.round((t+v*(c.comptage.pieces[String(v)]||0))*100)/100;});
  return Math.round(t*100)/100;
}

async function loadCaisses(){
  const mois=document.getElementById('mois-select').value;
  const{data}=await supabase.from('caisses').select('*').eq('mois',mois).order('gem');
  // Ne montrer que les caisses envoyées/validées — les brouillons restent privés au GEM
  caisses=(data||[]).filter(c=>c.statut_saisie!=='brouillon');
  renderTable();
  updateMetrics();
}
window.loadCaisses=loadCaisses;

function caisseStatutType(c){
  if(!c)return'absent';
  if(c.statut==='valide')return'valide';
  if((c.donnees_brouillon?.send_count||0)>1&&!c.donnees_brouillon?.vu_compta)return'modif';
  return'recue';
}

function updateMetrics(){
  const all=Object.keys(GEMS_CONFIG).length;
  document.getElementById('cnt-total').textContent=all;
  document.getElementById('cnt-recues').textContent=caisses.length;
  document.getElementById('cnt-ok').textContent=caisses.filter(c=>c.statut==='valide').length;
  document.getElementById('cnt-modif').textContent=caisses.filter(c=>(c.donnees_brouillon?.send_count||0)>1).length;
}

window.setFilter=function(val,el){
  currentFilter=val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
};

// Palette cohérente avec les cartes métriques
const STATUT_COLORS={
  absent:{bg:'#f5f5f5',text:'#888',border:'#ddd'},
  recue:{bg:'#dbeafe',text:'#1d4ed8',border:'#93c5fd'},
  modif:{bg:'#fef3c7',text:'#d97706',border:'#fcd34d'},
  valide:{bg:'#dcfce7',text:'#16a34a',border:'#86efac'},
};

function renderTable(){
  const tbody=document.getElementById('tbody');
  const allGems=Object.keys(GEMS_CONFIG);
  let rows='';
  allGems.forEach(gem=>{
    const c=caisses.find(x=>x.gem===gem);
    const type=caisseStatutType(c);
    const col=STATUT_COLORS[type];
    if(currentFilter==='tous'
      ||(currentFilter==='valide'&&type==='valide')
      ||(currentFilter==='recues'&&type==='recue')
      ||(currentFilter==='modif'&&type==='modif')){
      const cfg=GEMS_CONFIG[gem];
      const statutBadge=type==='valide'?'<span class="badge b-ok">✓ Validé</span>':type==='modif'?'<span class="badge b-warn">Modification</span>':c?'<span class="badge" style="background:#dbeafe;color:#1d4ed8">Reçue</span>':'<span class="badge b-wait">Non reçue</span>';
      const justif=c?c.statut_justificatifs:'—';
      const justifLabel={complets:'Complets',incomplets:'Incomplets',manquant:'Manquants'};
      const justifClass={complets:'ok',incomplets:'warn',manquant:'err'};
      const justifBtn=c?`<button class="jt-btn ${justifClass[justif]||''}" onclick="window.cycleJustif('${c.id}','${justif}',event)">${justifLabel[justif]||justif}</button>`:'<span style="color:#ccc">—</span>';
      const tc=c?totalComptage(c):null;
      const ecart=tc!==null&&c?Math.round((tc-c.solde_cloture)*100)/100:null;
      const ecartCell=ecart===null?'<span style="color:#ccc">—</span>':
        Math.abs(ecart)<0.01?'<span class="badge b-ok">✓ Conforme</span>':
        ecart>0?`<span class="badge b-warn">+${fmt(ecart)} €</span>`:
        `<span class="badge b-err">${fmt(ecart)} €</span>`;
      rows+=`<tr onclick="window.openDetail('${gem}')">
        <td style="font-weight:700;background:${col.bg};color:${col.text};border-left:3px solid ${col.border}">${gem}</td>
        <td><span class="badge b-wait" style="font-size:10px">${cfg.anal}</span></td>
        <td style="color:#16a34a">${c?'+'+fmt(c.total_avances)+' €':'—'}</td>
        <td style="color:#dc2626">${c?'-'+fmt(c.total_depenses)+' €':'—'}</td>
        <td style="color:#16a34a">${c?'+'+fmt(c.total_participations)+' €':'—'}</td>
        <td style="font-weight:600">${c?fmt(c.solde_cloture)+' €':'—'}</td>
        <td style="font-weight:600">${tc!==null?fmt(tc)+' €':'<span style="color:#ccc">—</span>'}</td>
        <td>${ecartCell}</td>
        <td onclick="event.stopPropagation()">${justifBtn}</td>
        <td>${statutBadge}</td>
        <td onclick="event.stopPropagation()"><button class="jt-btn" onclick="window.openDetail('${gem}')">Ouvrir →</button></td>
      </tr>`;
    }
  });
  tbody.innerHTML=rows||'<tr><td colspan="11" style="text-align:center;color:#aaa;padding:2rem">Aucun résultat</td></tr>';
}

async function cycleJustif(id,current,e){
  e.stopPropagation();
  const cycle={complets:'incomplets',incomplets:'manquant',manquant:'complets'};
  await supabase.from('caisses').update({statut_justificatifs:cycle[current]||'complets'}).eq('id',id);
  await loadCaisses();
}
window.cycleJustif=cycleJustif;

// ── Vue détail ────────────────────────────────────────────────────────────────

window.openDetail=async function(gem){
  try{
  const c=caisses.find(x=>x.gem===gem);
  currentCaisse=c||null;
  currentDeps=[];currentParts=[];currentAvances=[];

  if(c){
    if(!adjustments[c.id])adjustments[c.id]=[];

    // Marquer comme vu par la compta (retire le badge "Modification")
    if(caisseStatutType(c)==='modif'&&c.donnees_brouillon){
      const newSnap={...c.donnees_brouillon,vu_compta:true};
      supabase.from('caisses').update({donnees_brouillon:newSnap}).eq('id',c.id);
      c.donnees_brouillon=newSnap;
      const inList=caisses.find(x=>x.id===c.id);
      if(inList)inList.donnees_brouillon=newSnap;
      updateMetrics();
    }

    // Toujours interroger les tables en premier
    const[dr,pr,ar]=await Promise.all([
      supabase.from('depenses').select('*').eq('caisse_id',c.id),
      supabase.from('participations').select('*').eq('caisse_id',c.id),
      supabase.from('avances').select('*').eq('caisse_id',c.id),
    ]);
    currentDeps=dr.data||[];
    currentParts=pr.data||[];
    currentAvances=ar.data||[];

    // Fallback sur donnees_brouillon si les tables sont vides
    // (brouillon, snapshot d'envoi, ou politique RLS bloquant la lecture)
    const db=c.donnees_brouillon;
    if(db){
      const fromSnapshot=d=>({
        id:d.id,caisse_id:c.id,
        date_depense:d.date||null,fournisseur:d.fournisseur||'',
        categorie:(d.ventils||[]).filter(v=>v.cat).map(v=>v.cat.label).join(', ')||'—',
        compte:(d.ventils||[]).filter(v=>v.cat).map(v=>v.cat.compte).join(', ')||'—',
        montant:(d.ventils||[]).reduce((s,v)=>s+(v.montant||0),0),
        justificatif_url:d.justificatif_url||''
      });
      if(!currentDeps.length&&(db.deps||[]).length)
        currentDeps=(db.deps||[]).map(fromSnapshot);
      if(!currentParts.length&&(db.parts||[]).length)
        currentParts=(db.parts||[]).map(p=>({
          id:p.id,caisse_id:c.id,libelle:p.libelle||'',
          montant:p.montant||0,type:p.type||'participation',
          justificatif_url:p.justificatif_url||''
        }));
      if(!currentAvances.length&&(db.avances||[]).length)
        currentAvances=(db.avances||[]).map(a=>({
          id:a.id,caisse_id:c.id,date_avance:a.date||null,montant:a.montant||0
        }));
    }
    // Enrichir currentDeps avec les ventils du snapshot (montants par catégorie)
    if(db?.deps?.length&&currentDeps.length){
      currentDeps.forEach(dep=>{
        const snap=db.deps.find(sd=>sd.fournisseur===dep.fournisseur&&(sd.date===dep.date_depense||!dep.date_depense));
        if(snap?.ventils)dep.ventils=snap.ventils;
      });
    }
  }

  document.getElementById('vue-liste').style.display='none';
  document.getElementById('vue-detail').style.display='block';
  document.getElementById('btn-back').style.display='inline-block';
  document.getElementById('topbar-title').textContent='GEM '+gem+' — '+moisNom();

  renderKpiGrid();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab:first-child').classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-resume').classList.add('active');
  renderTabResume();
  }catch(e){
    console.error('openDetail error:',e);
  }
};

window.backToList=function(){
  document.getElementById('vue-detail').style.display='none';
  document.getElementById('vue-liste').style.display='block';
  document.getElementById('btn-back').style.display='none';

  currentCaisse=null;
  loadCaisses();
};

function renderKpiGrid(){
  const c=currentCaisse;
  if(!c){document.getElementById('kpi-grid').innerHTML='';return;}
  const tc=totalComptage(c);
  const ecart=tc!==null?Math.round((tc-c.solde_cloture)*100)/100:null;
  const ecartColor=ecart===null?'#888':Math.abs(ecart)<0.01?'#16a34a':ecart>0?'#854d0e':'#dc2626';
  const ecartText=ecart===null?'—':Math.abs(ecart)<0.01?'✓ Conforme':ecart>0?'+'+fmt(ecart)+' €':fmt(ecart)+' €';
  const tPartCotis=currentParts.reduce((s,p)=>s+(p.montant||0),0);
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi"><div class="kpi-label">Solde ouverture</div><div class="kpi-val">${fmt(c.solde_ouverture)} €</div></div>
    <div class="kpi" style="border-color:#d1fae5"><div class="kpi-label">Avances reçues</div><div class="kpi-val" style="color:#16a34a">+${fmt(c.total_avances)} €</div></div>
    <div class="kpi" style="border-color:#fecaca"><div class="kpi-label">Total dépenses</div><div class="kpi-val" style="color:#dc2626">-${fmt(c.total_depenses)} €</div></div>
    <div class="kpi" style="border-color:#6ee7b7"><div class="kpi-label">Participations / Adhésions</div><div class="kpi-val" style="color:#059669">+${fmt(tPartCotis)} €</div></div>
    <div class="kpi" style="border-color:#bfdbfe"><div class="kpi-label">Solde théorique</div><div class="kpi-val" style="color:#1d4ed8">${fmt(c.solde_cloture)} €</div></div>
    <div class="kpi" style="border-color:#e5e7eb"><div class="kpi-label">Comptage caisse</div><div class="kpi-val" style="color:#1a1a1a">${tc!==null?fmt(tc)+' €':'—'}</div></div>
    <div class="kpi" style="border-color:${ecartColor};background:${ecart!==null&&Math.abs(ecart)<0.01?'#f0fdf4':ecart!==null&&ecart>0?'#fefce8':ecart!==null?'#fff5f5':'white'}">
      <div class="kpi-label">Ecart</div>
      <div class="kpi-val" style="color:${ecartColor};font-size:15px">${ecartText}</div>
    </div>
  `;
  document.getElementById('kpi-grid').style.gridTemplateColumns='repeat(7,1fr)';
}

window.switchTab=function(name,el){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(el)el.classList.add('active');
  else document.querySelector(`.tab[onclick*="'${name}'"]`)?.classList.add('active');
  const fns={resume:renderTabResume,avances:renderTabAvances,depenses:renderTabDepenses,participations:renderTabParticipations,comptage:renderTabComptage,ecriture:renderTabEcriture};
  fns[name]?.();
};

function renderTabResume(){
  const el=document.getElementById('tab-resume');
  const c=currentCaisse;

function renderTabComptage(){
  const el=document.getElementById('tab-comptage');
  const c=currentCaisse;
  if(!c||!c.comptage){
    el.innerHTML='<div class="card"><div class="empty">Les données de comptage ne sont pas disponibles pour cette caisse.<br><small style="color:#aaa">Le GEM doit enregistrer un brouillon à l\'étape 3 pour que les données soient transmises.</small></div></div>';
    return;
  }
  const cpt=c.comptage;
  let tB=0,tP=0;

  const billetsRows=BILLETS.map(v=>{
    const n=(cpt.billets&&cpt.billets[String(v)])||0;
    const sub=Math.round(v*n*100)/100;tB+=sub;
    return n>0
      ?`<tr><td>${v} €</td><td style="text-align:center">${n}</td><td style="text-align:right;font-weight:600">${sub.toFixed(2)} €</td></tr>`
      :`<tr><td class="zero">${v} €</td><td class="zero" style="text-align:center">0</td><td class="zero" style="text-align:right">—</td></tr>`;
  }).join('');

  const piecesRows=PIECES.map(v=>{
    const n=(cpt.pieces&&cpt.pieces[String(v)])||0;
    const sub=Math.round(v*n*100)/100;tP+=sub;
    const label=v>=1?v+' €':Math.round(v*100)+' c';
    return n>0
      ?`<tr><td>${label}</td><td style="text-align:center">${n}</td><td style="text-align:right;font-weight:600">${sub.toFixed(2)} €</td></tr>`
      :`<tr><td class="zero">${label}</td><td class="zero" style="text-align:center">0</td><td class="zero" style="text-align:right">—</td></tr>`;
  }).join('');

  tB=Math.round(tB*100)/100;tP=Math.round(tP*100)/100;
  const total=Math.round((tB+tP)*100)/100;
  const theo=c.solde_cloture;
  const ecart=Math.round((total-theo)*100)/100;
  const ecartHtml=Math.abs(ecart)<0.01
    ?`<div class="ecart-box ecart-parfait">✅ Caisse conforme — total compté = solde théorique : ${fmt(theo)} €</div>`
    :ecart>0
      ?`<div class="ecart-box ecart-pos">📈 Écart positif de +${fmt(ecart)} € (compté ${fmt(total)} € / théorique ${fmt(theo)} €)</div>`
      :`<div class="ecart-box ecart-neg">📉 Écart négatif de ${fmt(ecart)} € (compté ${fmt(total)} € / théorique ${fmt(theo)} €)</div>`;

  el.innerHTML=`<div class="card">
    <div class="section-label">Comptage de la caisse</div>
    <div class="comptage-grid">
      <div>
        <div style="font-size:12px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:8px">Billets</div>
        <table class="comptage-tbl"><thead><tr><th>Valeur</th><th style="text-align:center">Qté</th><th style="text-align:right">Sous-total</th></tr></thead><tbody>${billetsRows}</tbody></table>
        <div class="comptage-sub"><span>Total billets</span><span>${fmt(tB)} €</span></div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:8px">Pièces</div>
        <table class="comptage-tbl"><thead><tr><th>Valeur</th><th style="text-align:center">Qté</th><th style="text-align:right">Sous-total</th></tr></thead><tbody>${piecesRows}</tbody></table>
        <div class="comptage-sub"><span>Total pièces</span><span>${fmt(tP)} €</span></div>
      </div>
    </div>
    <div class="total-row" style="font-size:15px;margin-top:1rem"><span>Total compté</span><span>${fmt(total)} €</span></div>
    <div style="display:flex;justify-content:space-between;padding:10px 12px;border:1px solid #eee;border-radius:8px;margin-top:.5rem;font-size:13px">
      <span style="color:#888">Solde théorique (clôture)</span><span style="font-weight:600">${fmt(theo)} €</span>
    </div>
    ${ecartHtml}
  </div>`;
}

// ── Tab : Écriture ────────────────────────────────────────────────────────────

function renderTabEcriture(){
  const c=currentCaisse;
  if(!c){document.getElementById('tab-ecriture').innerHTML='<div class="card"><div class="empty">Aucune saisie reçue pour ce mois.</div></div>';return;}
  const cfg=GEMS_CONFIG[c.gem]||{};
  const moisStr=document.getElementById('mois-select').value;
  const mp=moisStr.split('-');
  const ref=`CAISSE ${mp[1]}/${mp[0].slice(2)}`;
  const dateE=`31/${mp.reverse().join('/')}`;

  function buildRows(){
    const rows=[];
    const grouped={};
    currentDeps.forEach(d=>{
      if(d.ventils?.length>0){
        // Always use ventils directly — each ventil has its own compte and libellé
        d.ventils.forEach(v=>{
          const compte=(v.cat?.compte||'Autres');
          const lib=(v.cat?.label||'DIVERS').toUpperCase();
          const montant=v.montant||0;
          const key=compte+'|'+lib;
          if(!grouped[key])grouped[key]={compte,lib,montant:0};
          grouped[key].montant+=montant;
        });
      } else {
        const cats=d.categorie?d.categorie.split(', ').filter(Boolean):['DIVERS'];
        const comptes=d.compte?d.compte.split(', ').filter(Boolean):['Autres'];
        cats.forEach((cat,i)=>{
          const compte=comptes[i]||comptes[0]||'Autres';
          const montant=d.montant/cats.length;
          const key=compte+'|'+cat.toUpperCase();
          if(!grouped[key])grouped[key]={compte,lib:cat.toUpperCase(),montant:0};
          grouped[key].montant+=montant;
        });
      }
    });
    Object.values(grouped).forEach(g=>rows.push({compte:g.compte,anal:cfg.anal||'',lib:g.lib,debit:Math.round(g.montant*100)/100,credit:0,adj:false}));
    const parts=currentParts||[];
    // Group participations by compte (use custom compte if set, else default by type)
    const partGrouped={};
    parts.forEach(p=>{
      const isAdh=p.type==='cotisation';
      const defCompte=isAdh?'75600000':'70820000';
      const compte=p.compte||defCompte;
      const lib=isAdh?'ADHESIONS ADHERENTS':'PARTICIPATIONS ADHERENTS';
      const key=compte+'|'+lib;
      if(!partGrouped[key])partGrouped[key]={compte,lib,montant:0};
      partGrouped[key].montant+=p.montant||0;
    });
    Object.values(partGrouped).forEach(g=>{if(g.montant>0)rows.push({compte:g.compte,anal:cfg.anal||'',lib:g.lib,debit:0,credit:Math.round(g.montant*100)/100,adj:false});});
    (adjustments[c.id]||[]).forEach(a=>rows.push({...a,adj:true}));
    const tD=rows.reduce((s,r)=>s+r.debit,0),tC=rows.reduce((s,r)=>s+r.credit,0);
    rows.push({compte:cfg.compte||'531XXXXX',anal:cfg.anal||'',lib:`CAISSE ${c.gem.toUpperCase()} ${ref}`,debit:0,credit:Math.round((tD-tC)*100)/100,last:true});
    return rows;
  }

  function render(){
    const rows=buildRows();
    const tD=rows.reduce((s,r)=>s+r.debit,0),tC=rows.reduce((s,r)=>s+r.credit,0);
    const eq=Math.abs(tD-tC)<0.01;
    const adj=adjustments[c.id]||[];

    // ── Tableau récapitulatif par catégorie ──
    const catMap={};
    currentDeps.forEach(d=>{
      const cats=(d.categorie||'').split(', ').filter(Boolean);
      const comptes=(d.compte||'').split(', ').filter(Boolean);
      const ventils=d.ventils;
      cats.forEach((cat,i)=>{
        const montant=ventils?.length>0&&ventils[i]?ventils[i].montant||0:Math.round(d.montant/Math.max(cats.length,1)*100)/100;
        if(!catMap[cat])catMap[cat]={icon:CATS_ICONS[cat]||'📦',compte:comptes[i]||CATS_COMPTES[cat]||'',items:[]};
        catMap[cat].items.push({date:d.date_depense,fournisseur:d.fournisseur||'—',montant});
      });
    });
    const catEntries=Object.entries(catMap);
    const maxRows=catEntries.length?Math.max(...catEntries.map(([,d])=>d.items.length)):0;
    let tableRows='';
    for(let i=0;i<maxRows;i++){
      tableRows+=`<tr>${catEntries.map(([,data])=>{const it=data.items[i];return it
        ?`<td style="padding:6px 10px;border:1px solid #eee;vertical-align:top">
            <div style="font-size:10px;color:#888">${it.date||'—'}</div>
            <div style="font-size:12px;margin:1px 0;white-space:nowrap">${it.fournisseur}</div>
            <div style="font-size:12px;font-weight:600;color:#1a1a1a;text-align:right">${fmt(it.montant)} €</div>
          </td>`
        :`<td style="border:1px solid #eee;background:#fafafa"></td>`;}).join('')}</tr>`;
    }
    const summaryTable=catEntries.length?`<div class="card" style="margin-bottom:1rem">
      <div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:1rem">📊 Récapitulatif des dépenses par catégorie</div>
      <div style="overflow-x:auto">
        <table style="border-collapse:collapse;width:100%">
          <thead><tr>${catEntries.map(([cat,data])=>`<th style="padding:10px;text-align:center;border:1px solid #eee;background:#f8f8f8;min-width:130px">
            <div style="font-size:22px;margin-bottom:4px">${data.icon}</div>
            <div style="font-size:12px;font-weight:700">${cat}</div>
            <div style="font-size:10px;color:#888;font-family:monospace;margin-top:2px">${data.compte}</div>
          </th>`).join('')}</tr></thead>
          <tbody>${tableRows}</tbody>
          <tfoot><tr>${catEntries.map(([,data])=>`<td style="padding:8px 10px;border:1px solid #fca5a5;background:#f5f5f5;font-weight:800;color:#1a1a1a;text-align:right;font-size:13px">
            Total : ${fmt(data.items.reduce((s,it)=>s+it.montant,0))} €
          </td>`).join('')}</tr></tfoot>
        </table>
      </div>
    </div>`:'';

    document.getElementById('tab-ecriture').innerHTML=summaryTable+`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <div>
            <div class="card-title">Journal ${cfg.journal||'CA??'} — ${moisNom()}</div>
            <div style="font-size:12px;color:#888;margin-top:3px">Réf. : ${ref}</div>
          </div>
          <button class="btn-copy" id="btn-copy-ecr" onclick="window._copierEcr()">Copier tout</button>
        </div>
        <div style="font-size:12px;color:#888;margin-bottom:.5rem">

// ── Téléchargement résumé caisse PDF ─────────────────────────────────────────

window.telechargerCaissePdf=async function(){
  const btn=document.getElementById('btn-pdf-caisse');
  if(!btn)return;
  const orig=btn.innerHTML;
  btn.disabled=true;btn.innerHTML='⏳ Génération...';
  try{
    // Charger jsPDF + autoTable si pas encore chargés
    if(!window.jspdf){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    if(!window.jspdf?.jsPDF?.prototype?.autoTable){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
    const c=currentCaisse;
    const moisSel=document.getElementById('mois-select');
    const moisNomStr=moisSel.options[moisSel.selectedIndex]?.text||'';

    // ── En-tête ──
    doc.setFillColor(22,73,184);doc.rect(0,0,210,22,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(15);doc.setFont(undefined,'bold');
    doc.text(`Caisse GEM — ${c.gem}`,14,10);
    doc.setFontSize(9);doc.setFont(undefined,'normal');
    doc.text(`${moisNomStr}  ·  Responsable : ${c.responsable||'—'}  ·  Dossier : ${c.dossier||'—'}`,14,17);

    let y=28;

    // ── Résumé financier ──
    const tc=totalComptage(c);
    const ecart=tc!==null?Math.round((tc-c.solde_cloture)*100)/100:null;
    const ecartTxt=ecart===null?'Non disponible':Math.abs(ecart)<0.01?'Conforme':(ecart>0?'+':'')+fmt(ecart)+' EUR';
    doc.setTextColor(22,73,184);doc.setFontSize(11);doc.setFont(undefined,'bold');
    doc.text('Résumé financier',14,y);y+=1;
    doc.setDrawColor(22,73,184);doc.setLineWidth(0.5);doc.line(14,y,196,y);y+=3;
    doc.autoTable({startY:y,margin:{left:14,right:14},
      body:[
        ['Solde d\'ouverture',`${fmt(c.solde_ouverture)} EUR`],
        ['Avances recues',`+${fmt(c.total_avances)} EUR`],
        ['Total depenses',`-${fmt(c.total_depenses)} EUR`],
        ['Participations / Adhésions',`+${fmt(c.total_participations)} EUR`],
        ['Solde theorique de cloture',`${fmt(c.solde_cloture)} EUR`],
        ['Comptage physique',tc!==null?`${fmt(tc)} EUR`:'Non disponible'],
        ['Ecart caisse',ecartTxt],
      ],
      styles:{fontSize:9,cellPadding:2.5},
      columnStyles:{0:{cellWidth:130,textColor:[80,80,80]},1:{cellWidth:52,halign:'right',fontStyle:'bold'}},
      theme:'plain',
      didParseCell:d=>{
        if(d.row.index===4){d.cell.styles.textColor=[22,73,184];d.cell.styles.fontStyle='bold';}
        if(tc!==null&&d.row.index===6){d.cell.styles.textColor=Math.abs(ecart)<0.01?[22,163,74]:ecart>0?[133,77,14]:[220,38,38];d.cell.styles.fontStyle='bold';}
      }
    });
    y=doc.lastAutoTable.finalY+8;

    // ── Avances ──
    if(currentAvances.length){
      if(y>250){doc.addPage();y=20;}
      doc.setTextColor(22,163,74);doc.setFontSize(11);doc.setFont(undefined,'bold');
      doc.text(`Avances reçues (${currentAvances.length})`,14,y);y+=1;
      doc.setDrawColor(22,163,74);doc.line(14,y,196,y);y+=3;
      doc.autoTable({startY:y,margin:{left:14,right:14},
        head:[['Date','Montant']],
        body:[
          ...currentAvances.map(a=>[a.date_avance||'-',`+${fmt(a.montant)} EUR`]),
          ['Total',`+${fmt(currentAvances.reduce((s,a)=>s+(a.montant||0),0))} EUR`]
        ],
        styles:{fontSize:9},headStyles:{fillColor:[220,252,231],textColor:[6,78,59],fontStyle:'bold'},
        columnStyles:{1:{halign:'right',fontStyle:'bold'}},
        didParseCell:d=>{if(d.row.index===currentAvances.length)d.cell.styles.fontStyle='bold';},
        theme:'grid'});
      y=doc.lastAutoTable.finalY+8;
    }

    // ── Dépenses ──
    if(currentDeps.length){
      if(y>230){doc.addPage();y=20;}
      doc.setTextColor(192,80,94);doc.setFontSize(11);doc.setFont(undefined,'bold');
      doc.text(`Dépenses (${currentDeps.length})`,14,y);y+=1;
      doc.setDrawColor(192,80,94);doc.line(14,y,196,y);y+=3;
      const depBody=currentDeps.map(d=>{
        const cats=d.ventils?.length>0
          ?d.ventils.filter(v=>v.cat).map(v=>`${v.cat.label} (${fmt(v.montant)}€)`).join(' + ')
          :(d.categorie||'—');
        return[d.date_depense||'-',d.fournisseur||'-',cats,`${fmt(d.montant)} EUR`];
      });
      depBody.push(['Total','','',`-${fmt(currentDeps.reduce((s,d)=>s+(d.montant||0),0))} EUR`]);
      doc.autoTable({startY:y,margin:{left:14,right:14},
        head:[['Date','Fournisseur','Type de dépense','Montant']],
        body:depBody,
        styles:{fontSize:8.5,cellPadding:2},
        headStyles:{fillColor:[254,246,246],textColor:[153,50,50],fontStyle:'bold'},
        columnStyles:{0:{cellWidth:22},3:{halign:'right',cellWidth:22}},
        didParseCell:d=>{if(d.row.index===currentDeps.length)d.cell.styles.fontStyle='bold';},
        theme:'grid'});
      y=doc.lastAutoTable.finalY+8;
    }

    // ── Participations ──
    if(currentParts.length){
      if(y>240){doc.addPage();y=20;}
      doc.setTextColor(5,150,105);doc.setFontSize(11);doc.setFont(undefined,'bold');
      doc.text(`Participations & Adhésions (${currentParts.length})`,14,y);y+=1;
      doc.setDrawColor(5,150,105);doc.line(14,y,196,y);y+=3;
      const partBody=currentParts.map(p=>[p.libelle||'-',p.type==='cotisation'?'Cotisation':'Participation',`+${fmt(p.montant)} EUR`]);
      partBody.push(['Total','',`+${fmt(currentParts.reduce((s,p)=>s+(p.montant||0),0))} EUR`]);
      doc.autoTable({startY:y,margin:{left:14,right:14},
        head:[['Libellé','Type','Montant']],
        body:partBody,
        styles:{fontSize:9,cellPadding:2.5},
        headStyles:{fillColor:[209,250,229],textColor:[6,78,59],fontStyle:'bold'},
        columnStyles:{2:{halign:'right',fontStyle:'bold'}},
        didParseCell:d=>{if(d.row.index===currentParts.length)d.cell.styles.fontStyle='bold';},
        theme:'grid'});
    }

    // ── Pied de page ──
    const total=doc.internal.getNumberOfPages();
    for(let i=1;i<=total;i++){
      doc.setPage(i);doc.setTextColor(160);doc.setFontSize(7.5);doc.setFont(undefined,'normal');
      doc.text(`Fondation Falret — GEM ${c.gem} — ${moisNomStr} — Page ${i}/${total}`,14,290);
    }

    doc.save(`caisse_${c.gem.replace(/\s+/g,'_')}_${document.getElementById('mois-select').value}.pdf`);

  }catch(e){console.error(e);alert('Erreur PDF : '+e.message);}
  finally{btn.disabled=false;btn.innerHTML=orig;}
};

// ── Téléchargement justificatifs ──────────────────────────────────────────────

window.telechargerTousJustifs=async function(){
  const allPaths=[];
  currentDeps.forEach(d=>{
    (d.justificatif_url||'').split(',').filter(u=>u.trim()).forEach(u=>allPaths.push(u));
  });
  currentParts.forEach(p=>{
    (p.justificatif_url||'').split(',').filter(u=>u.trim()).forEach(u=>allPaths.push(u));
  });

  if(!allPaths.length){
    alert('Aucun justificatif disponible pour cette caisse.');
    return;
  }

  const btn=document.getElementById('btn-dl-justifs');
  if(!btn)return;
  const orig=btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:spin 1s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Génération en cours…';

  // Inject spin animation if not already present
  if(!document.getElementById('spin-style')){
    const s=document.createElement('style');
    s.id='spin-style';s.textContent='@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }

  try{
    const {PDFDocument}=await import('https://esm.sh/pdf-lib@1.17.1');
    const merged=await PDFDocument.create();
    const W=595,H=842,M=36; // A4 en points
    let added=0;

    for(const path of allPaths){
      const {data,error}=await supabase.storage.from('justificatifs').createSignedUrl(path,300);
      if(error||!data?.signedUrl)continue;

      let resp;
      try{resp=await fetch(data.signedUrl);}catch{continue;}
      if(!resp.ok)continue;

      const buf=await resp.arrayBuffer();
      const lc=path.toLowerCase();

      try{
        if(lc.endsWith('.pdf')){
          const donor=await PDFDocument.load(buf,{ignoreEncryption:true});
          const pages=await merged.copyPages(donor,donor.getPageIndices());
          pages.forEach(p=>merged.addPage(p));
          added++;
        } else {
          let img;
          if(lc.match(/\.(jpg|jpeg)$/)){
            img=await merged.embedJpg(buf);
          } else if(lc.endsWith('.png')){
            img=await merged.embedPng(buf);
          } else {
            continue;
          }
          const {width:iw,height:ih}=img;
          const sc=Math.min((W-2*M)/iw,(H-2*M)/ih,1);
          const dw=iw*sc,dh=ih*sc;
          const pg=merged.addPage([W,H]);
          pg.drawImage(img,{x:(W-dw)/2,y:(H-dh)/2,width:dw,height:dh});
          added++;
        }
      } catch(e){console.warn('Justificatif ignoré :',path,e);}
    }

    if(!added){
      alert('Aucun justificatif n\'a pu être chargé ('+allPaths.length+' tentés).');
      return;
    }

    const bytes=await merged.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    const mois=document.getElementById('mois-select').value;
    a.download=`justificatifs_${currentCaisse.gem.replace(/\s+/g,'_')}_${mois}.pdf`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},60000);

  } catch(e){
    console.error(e);
    alert('Erreur lors de la génération du PDF : '+e.message);
  } finally{
    btn.disabled=false;
    btn.innerHTML=orig;
  }
};

window._editData=null;

window.ouvrirEditCaisse=function(){
  if(!currentCaisse)return;
  const c=currentCaisse;
  const cpt=c.comptage||{billets:{},pieces:{}};
  const snapDeps=c.donnees_brouillon?.deps||[];
  window._editData={
    responsable:c.responsable||'',notes:c.notes||'',
    avances:currentAvances.map(a=>({date:a.date_avance||'',montant:a.montant||0})),
    deps:(snapDeps.length?snapDeps:currentDeps.map(d=>({date:d.date_depense,fournisseur:d.fournisseur,ventils:[{cat:{label:d.categorie,compte:d.compte},montant:d.montant}],justificatif_url:d.justificatif_url}))).map(d=>({
      date:d.date||d.date_depense||'',fournisseur:d.fournisseur||'',justificatif_url:d.justificatif_url||'',
      ventils:(d.ventils||[{cat:{label:'Autres',compte:''},montant:0}]).map(v=>({libelle:v.cat?.label||'',compte:v.cat?.compte||'',montant:v.montant||0}))
    })),
    parts:(c.donnees_brouillon?.parts||currentParts).map(p=>({libelle:p.libelle||'',type:p.type||'participation',montant:p.montant||0,compte:p.compte||''})),
    comptage:{billets:{...((cpt.billets)||{})},pieces:{...((cpt.pieces)||{})}},
  };
  document.getElementById('edit-modal-subtitle').textContent='GEM '+c.gem+' — '+moisNom();
  window._renderEditModal();
  document.getElementById('modal-edit-caisse').classList.add('open');
};

window.fermerEditCaisse=function(){
  document.getElementById('modal-edit-caisse').classList.remove('open');
  window._editData=null;
};

function _fmtE(n){return(parseFloat(n)||0).toFixed(2).replace('.',',');}

window._recalcEditComptage=function(){
  if(!window._editData)return;
  const e=window._editData;
  const tB=BILLETS.reduce((s,v)=>s+v*(e.comptage.billets[String(v)]||0),0);
  const tP=PIECES.reduce((s,v)=>Math.round((s+v*(e.comptage.pieces[String(v)]||0))*100)/100,0);
  const tc=Math.round((tB+tP)*100)/100;
  const ta=e.avances.reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
  const td=e.deps.reduce((s,d)=>s+d.ventils.reduce((sv,v)=>sv+(parseFloat(v.montant)||0),0),0);
  const tp=e.parts.reduce((s,p)=>s+(parseFloat(p.montant)||0),0);
  const solde=Math.round((currentCaisse.solde_ouverture+ta+tp-td)*100)/100;
  const ev=Math.round((tc-solde)*100)/100;
  const el=document.getElementById('edit-cpt-total');
  if(el)el.innerHTML=`<span>Total comptage</span><span>${_fmtE(tc)} €</span>`;
  const el2=document.getElementById('edit-ecart-val');
  if(el2){el2.textContent=Math.abs(ev)<0.01?'Conforme':(ev>0?'+':'')+_fmtE(ev)+' €';el2.parentElement.style.color=Math.abs(ev)<0.01?'#16a34a':ev>0?'#d97706':'#dc2626';}
};

window._recalcEdit=function(){
  if(!window._editData)return;
  const e=window._editData;
  const ta=e.avances.reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
  const td=e.deps.reduce((s,d)=>s+d.ventils.reduce((sv,v)=>sv+(parseFloat(v.montant)||0),0),0);
  const tp=e.parts.reduce((s,p)=>s+(parseFloat(p.montant)||0),0);
  const solde=Math.round((currentCaisse.solde_ouverture+ta+tp-td)*100)/100;
  const el=document.getElementById('edit-summary-block');

};

window._renderEditModal=function(){
  const e=window._editData;
  const ta=e.avances.reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
  const td=e.deps.reduce((s,d)=>s+d.ventils.reduce((sv,v)=>sv+(parseFloat(v.montant)||0),0),0);
  const tp=e.parts.reduce((s,p)=>s+(parseFloat(p.montant)||0),0);
  const solde=Math.round((currentCaisse.solde_ouverture+ta+tp-td)*100)/100;
  const eb=`onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"`;
  const ic='class="edit-inp"';

  const avHtml=`<div class="edit-section"><div class="edit-section-title est-blue">Avances reçues (${e.avances.length})</div>
    <table class="edit-table"><thead><tr><th>Date</th><th>Montant</th><th></th></tr></thead><tbody>
    ${e.avances.map((a,i)=>`<tr>
      <td><input ${ic} type="date" value="${a.date}" onchange="window._editData.avances[${i}].date=this.value" ${eb}></td>
      <td><input ${ic} type="number" style="text-align:right" value="${a.montant}" onchange="window._editData.avances[${i}].montant=parseFloat(this.value)||0;window._recalcEdit()" ${eb}></td>
      <td><button class="edit-del-btn" onclick="window._editData.avances.splice(${i},1);window._renderEditModal()">×</button></td>
    </tr>`).join('')}
    </tbody></table>
    <button class="edit-add-btn" onclick="window._editData.avances.push({date:'',montant:0});window._renderEditModal()">+ Ajouter une avance</button></div>`;

  const depHtml=`<div class="edit-section"><div class="edit-section-title est-red">Dépenses (${e.deps.length})</div>
    ${e.deps.map((d,di)=>{
      const dTot=d.ventils.reduce((s,v)=>s+(parseFloat(v.montant)||0),0);
      return`<div style="border:1px solid #fca5a5;border-radius:8px;margin-bottom:8px;overflow:hidden">
        <div style="display:grid;grid-template-columns:130px 1fr auto auto;gap:6px;align-items:center;padding:8px 10px;background:#fff5f5">
          <input ${ic} type="date" value="${d.date}" onchange="window._editData.deps[${di}].date=this.value" ${eb}>
          <input ${ic} type="text" placeholder="Fournisseur" value="${d.fournisseur||''}" onchange="window._editData.deps[${di}].fournisseur=this.value" ${eb}>
          <span style="font-weight:700;color:#b91c1c;white-space:nowrap">${_fmtE(dTot)} €</span>
          <button class="edit-del-btn" onclick="window._editData.deps.splice(${di},1);window._renderEditModal()">×</button>
        </div>
        <table class="edit-table" style="margin:0"><thead><tr><th>Libellé / Nature</th><th>Compte</th><th>Montant</th><th></th></tr></thead><tbody>
        ${d.ventils.map((v,vi)=>`<tr>
          <td><input ${ic} type="text" value="${v.libelle||''}" placeholder="ex. Carburant..." onchange="window._editData.deps[${di}].ventils[${vi}].libelle=this.value" ${eb}></td>
          <td><input ${ic} type="text" value="${v.compte||''}" style="font-family:monospace;font-size:12px" placeholder="60xxxxxx" onchange="window._editData.deps[${di}].ventils[${vi}].compte=this.value" ${eb}></td>
          <td><input ${ic} type="number" style="text-align:right" value="${v.montant||0}" onchange="window._editData.deps[${di}].ventils[${vi}].montant=parseFloat(this.value)||0;window._recalcEdit()" ${eb}></td>
          <td><button class="edit-del-btn" onclick="if(window._editData.deps[${di}].ventils.length>1){window._editData.deps[${di}].ventils.splice(${vi},1);window._renderEditModal()}" ${d.ventils.length<=1?'disabled':''}>×</button></td>
        </tr>`).join('')}
        </tbody></table>
        <div style="padding:4px 10px 8px"><button class="edit-add-btn" style="margin:0" onclick="window._editData.deps[${di}].ventils.push({libelle:'',compte:'',montant:0});window._renderEditModal()">+ Autre nature sur ce ticket</button></div>
      </div>`;
    }).join('')}
    <button class="edit-add-btn" onclick="window._editData.deps.push({date:'',fournisseur:'',ventils:[{libelle:'',compte:'',montant:0}],justificatif_url:''});window._renderEditModal()">+ Ajouter une dépense</button></div>`;

  const to=v=>`<option value="participation" ${v!=='cotisation'?'selected':''}>Participation</option><option value="cotisation" ${v==='cotisation'?'selected':''}>Adhésion</option>`;
  const partHtml=`<div class="edit-section"><div class="edit-section-title est-green">Participations / Adhésions (${e.parts.length})</div>
    <table class="edit-table"><thead><tr><th>Libellé</th><th>Type</th><th>Compte</th><th>Montant</th><th></th></tr></thead><tbody>
    ${e.parts.map((p,i)=>`<tr>
      <td><input ${ic} type="text" value="${p.libelle||''}" onchange="window._editData.parts[${i}].libelle=this.value" ${eb}></td>
      <td><select class="edit-inp" style="width:auto" onchange="window._editData.parts[${i}].type=this.value">${to(p.type)}</select></td>
      <td><input ${ic} type="text" value="${p.compte||''}" style="font-family:monospace;font-size:12px" placeholder="7xxxxxxx" onchange="window._editData.parts[${i}].compte=this.value" ${eb}></td>
      <td><input ${ic} type="number" style="text-align:right" value="${p.montant||0}" onchange="window._editData.parts[${i}].montant=parseFloat(this.value)||0;window._recalcEdit()" ${eb}></td>
      <td><button class="edit-del-btn" onclick="window._editData.parts.splice(${i},1);window._renderEditModal()">×</button></td>
    </tr>`).join('')}
    </tbody></table>
    <button class="edit-add-btn" onclick="window._editData.parts.push({libelle:'',type:'participation',montant:0,compte:''});window._renderEditModal()">+ Ajouter une ligne</button></div>`;

  // Comptage section
  const eb2=`onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"`;
  const cptUpdateFn=(type,val)=>`window._editData.comptage.${type}[String(${val})]=parseInt(this.value)||0;window._recalcEditComptage()`;
  const billetsHtml=BILLETS.map(v=>`<tr>
    <td style="font-weight:600">${v>=1?v+' €':Math.round(v*100)+' c'}</td>
    <td><input class="edit-inp" type="number" min="0" style="text-align:center;max-width:80px" value="${e.comptage.billets[String(v)]||0}" onchange="${cptUpdateFn('billets',v)}" ${eb2}></td>
    <td style="text-align:right;color:#555">${_fmtE(v*(e.comptage.billets[String(v)]||0))} €</td>
  </tr>`).join('');
  const piecesHtml=PIECES.map(v=>`<tr>
    <td style="font-weight:600">${v>=1?v+' €':Math.round(v*100)+' c'}</td>
    <td><input class="edit-inp" type="number" min="0" style="text-align:center;max-width:80px" value="${e.comptage.pieces[String(v)]||0}" onchange="${cptUpdateFn('pieces',v)}" ${eb2}></td>
    <td style="text-align:right;color:#555">${_fmtE(v*(e.comptage.pieces[String(v)]||0))} €</td>
  </tr>`).join('');
  const tBEdit=BILLETS.reduce((s,v)=>s+v*(e.comptage.billets[String(v)]||0),0);
  const tPEdit=PIECES.reduce((s,v)=>Math.round((s+v*(e.comptage.pieces[String(v)]||0))*100)/100,0);
  const tcEdit=Math.round((tBEdit+tPEdit)*100)/100;
  const cptHtml=`<div class="edit-section"><div class="edit-section-title est-purple">Comptage</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div>
        <div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:.4rem">Billets</div>
        <table class="edit-table"><thead><tr><th>Valeur</th><th style="text-align:center">Qté</th><th style="text-align:right">Sous-total</th></tr></thead><tbody>${billetsHtml}</tbody></table>
        <div class="comptage-sub" style="margin-top:4px">Total billets <span>${_fmtE(tBEdit)} €</span></div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:.4rem">Pièces</div>
        <table class="edit-table"><thead><tr><th>Valeur</th><th style="text-align:center">Qté</th><th style="text-align:right">Sous-total</th></tr></thead><tbody>${piecesHtml}</tbody></table>
        <div class="comptage-sub" style="margin-top:4px">Total pièces <span>${_fmtE(tPEdit)} €</span></div>
      </div>
    </div>
    <div id="edit-cpt-total" style="display:flex;justify-content:space-between;padding:8px 10px;background:#f3e8ff;border-radius:8px;margin-top:.75rem;font-weight:700;font-size:14px;color:#7c3aed"><span>Total comptage</span><span>${_fmtE(tcEdit)} €</span></div>
  </div>`;

  // Ecart using editData comptage
  const ev=Math.round((tcEdit-solde)*100)/100;
  const ecartLine=`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:${Math.abs(ev)<0.01?'#16a34a':ev>0?'#d97706':'#dc2626'}"><span>Écart comptage</span><span id="edit-ecart-val">${Math.abs(ev)<0.01?'Conforme':(ev>0?'+':'')+_fmtE(ev)+' €'}</span></div>`;

  document.getElementById('modal-edit-content').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem">
      <div><label style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;display:block;margin-bottom:5px">Responsable</label>
        <input class="edit-inp" type="text" value="${e.responsable}" onchange="window._editData.responsable=this.value" ${eb}></div>
      <div><label style="font-size:11px;color:#888;font-weight:600;text-transform:uppercase;display:block;margin-bottom:5px">Notes comptable</label>
        <input class="edit-inp" type="text" value="${e.notes||''}" onchange="window._editData.notes=this.value" ${eb}></div>
    </div>
    ${avHtml}${depHtml}${partHtml}${cptHtml}
    <div class="edit-summary">
      <div style="font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem">Récapitulatif recalculé</div>
      <div id="edit-summary-block">${_buildSummaryHtml(ta,td,tp,solde)}</div>
      <div style="margin-top:.5rem;padding-top:.5rem;border-top:1px solid #eee">${ecartLine}</div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;padding-top:.5rem;border-top:1px solid #eee">
      <button onclick="window.fermerEditCaisse()" style="padding:10px 20px;border-radius:10px;border:1px solid #ddd;background:white;font-size:13px;cursor:pointer;font-family:inherit">Annuler</button>
      <button class="btn-save-edit" onclick="window.sauvegarderEditCaisse()">✓ Valider et enregistrer</button>
    </div>`;
};

window.sauvegarderEditCaisse=async function(){
  if(!window._editData||!currentCaisse)return;
  const e=window._editData;
  const btn=document.querySelector('.btn-save-edit');
  if(btn){btn.disabled=true;btn.textContent='Enregistrement...';}
  try{
    const ta=e.avances.reduce((s,a)=>s+(parseFloat(a.montant)||0),0);
    const td=e.deps.reduce((s,d)=>s+d.ventils.reduce((sv,v)=>sv+(parseFloat(v.montant)||0),0),0);
    const tp=e.parts.reduce((s,p)=>s+(parseFloat(p.montant)||0),0);
    const solde=Math.round((currentCaisse.solde_ouverture+ta+tp-td)*100)/100;
    const snap={
      ...(currentCaisse.donnees_brouillon||{}),
      responsable:e.responsable,
      avances:e.avances.map((a,i)=>({id:i+1,date:a.date,montant:parseFloat(a.montant)||0})),
      deps:e.deps.map((d,i)=>({
        id:i+1,date:d.date,fournisseur:d.fournisseur,
        ventils:d.ventils.map((v,j)=>({id:(i+1)*100+j,cat:{label:v.libelle||'Autres',compte:v.compte||'',icon:CATS_ICONS[v.libelle]||'📦'},montant:parseFloat(v.montant)||0})),
        files:[],justificatif_url:d.justificatif_url||''
      })),
      parts:e.parts.map((p,i)=>({
        id:i+1,libelle:p.libelle,type:p.type,montant:parseFloat(p.montant)||0,compte:p.compte||'',
        files:[],justificatif_url:currentParts[i]?.justificatif_url||''
      })),
      is_snapshot:true,send_count:currentCaisse.donnees_brouillon?.send_count||1,comptable_modifie:true
    };
    const newComptage={billets:{...e.comptage.billets},pieces:{...e.comptage.pieces}};
    const{error}=await supabase.from('caisses').update({
      responsable:e.responsable,notes:e.notes,
      total_avances:Math.round(ta*100)/100,total_depenses:Math.round(td*100)/100,
      total_participations:Math.round(tp*100)/100,solde_cloture:solde,
      comptage:newComptage,donnees_brouillon:snap
    }).eq('id',currentCaisse.id);
    if(error)throw error;
    currentCaisse.responsable=e.responsable;currentCaisse.notes=e.notes;
    currentCaisse.total_avances=Math.round(ta*100)/100;currentCaisse.total_depenses=Math.round(td*100)/100;
    currentCaisse.total_participations=Math.round(tp*100)/100;currentCaisse.solde_cloture=solde;
    currentCaisse.comptage=newComptage;currentCaisse.donnees_brouillon=snap;
    currentAvances=snap.avances.map(a=>({...a,date_avance:a.date}));
    currentDeps=snap.deps.map(d=>({...d,date_depense:d.date,categorie:d.ventils.map(v=>v.cat?.label||'').join(', '),compte:d.ventils.map(v=>v.cat?.compte||'').join(', '),montant:d.ventils.reduce((s,v)=>s+(v.montant||0),0)}));
    currentParts=snap.parts.map(p=>({...p}));
    window.fermerEditCaisse();
    renderKpiGrid();
    window.switchTab('resume',document.querySelector('.tab:first-child'));
    loadCaisses();
  }catch(err){
    console.error(err);alert('Erreur : '+(err.message||'réessayez.'));
  }finally{if(btn){btn.disabled=false;btn.textContent='✓ Valider et enregistrer';}}
};

// ── Actions ───────────────────────────────────────────────────────────────────

window.saveNote=function(){
  if(!currentCaisse)return;
  const v=document.getElementById('note-ctrl')?.value||'';
  notesCompta[currentCaisse.id]=v;
  const btn=event.target;
  btn.textContent='✓ Enregistrée';setTimeout(()=>{btn.textContent='Enregistrer la note';},2000);
};

window.validerCaisse=async function(id){
  if(!currentCaisse)return;
  const newStatut=currentCaisse.statut==='valide'?'en_attente':'valide';
  await supabase.from('caisses').update({statut:newStatut}).eq('id',id);
  currentCaisse.statut=newStatut;
  const inList=caisses.find(x=>x.id===id);
  if(inList)inList.statut=newStatut;
  renderKpiGrid();
  window.switchTab('resume',document.querySelector('.tab:first-child'));
};

window.doLogout=function(){localStorage.removeItem('falret_user');window.location.href='index.html';};

init();
</script>
<!-- Modal édition comptable -->
<div class="edit-modal-overlay" id="modal-edit-caisse">
  <div class="edit-modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #eee">
      <div>
        <div style="font-size:18px;font-weight:800;color:#1a1a1a">✏️ Modifier la caisse</div>
        <div style="font-size:12px;color:#888;margin-top:3px" id="edit-modal-subtitle"></div>
      </div>
      <button onclick="window.fermerEditCaisse()" style="border:none;background:#f0f0f0;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit">✕ Annuler</button>
    </div>
    <div id="modal-edit-content"></div>
  </div>
</div>
