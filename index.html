<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caisses GEM — Fondation Falret</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#08235e 0%,#0d3494 35%,#1649b8 65%,#0b2e80 100%);
  position:relative;overflow:hidden;padding:2rem;
}

/* ── Lumière centrale douce ── */
body::before{
  content:'';position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:70vw;height:70vh;
  background:radial-gradient(ellipse,rgba(100,160,255,0.12) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Groupes de silhouettes ── */
.bg-figures{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.fig-group{position:absolute}

@keyframes float {0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)}}
@keyframes float2{0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)}}
@keyframes float3{0%,100%{transform:translateY(-6px)} 50%{transform:translateY(6px)}}

/* Bas gauche — grand groupe */
.fg1{bottom:-18px;left:-35px;opacity:.16;animation:float 9s ease-in-out infinite}
/* Haut droite — moyen groupe, penché */
.fg2{top:-12px;right:-50px;opacity:.12;animation:float2 11s ease-in-out infinite 2s;transform-origin:center bottom}
/* Milieu gauche — petit, discret */
.fg3{top:18%;left:2%;opacity:.08;animation:float3 10s ease-in-out infinite 1s}
/* Bas droite */
.fg4{bottom:4%;right:-25px;opacity:.13;animation:float 12s ease-in-out infinite 3.5s}
/* Haut centre-gauche */
.fg5{top:2%;left:22%;opacity:.07;animation:float2 8s ease-in-out infinite 4s}
/* Milieu droite */
.fg6{top:38%;right:1%;opacity:.09;animation:float3 13s ease-in-out infinite 0.5s}

/* ── En-tête de page ── */
.page-header{
  text-align:center;margin-bottom:2rem;
  color:white;position:relative;z-index:1;
}
.falret-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.14);
  border:1px solid rgba(255,255,255,0.28);
  border-radius:30px;padding:5px 16px;
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.9);margin-bottom:1.25rem;
  backdrop-filter:blur(4px);
}
.page-header h1{
  font-size:34px;font-weight:800;letter-spacing:-.5px;line-height:1.2;
  margin-bottom:.6rem;
  text-shadow:0 2px 16px rgba(0,0,0,0.25);
}
.page-header p{
  font-size:15px;font-weight:400;color:rgba(255,255,255,0.65);letter-spacing:.03em;
}

/* ── Carte de connexion ── */
.login-card{
  background:rgba(255,255,255,0.97);
  border-radius:22px;
  padding:2.25rem 2.5rem 2rem;
  width:100%;max-width:400px;
  box-shadow:0 28px 70px rgba(0,0,0,0.28),0 1px 0 rgba(255,255,255,0.2) inset;
  position:relative;z-index:1;
  border:1px solid rgba(255,255,255,0.5);
}
.card-title{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:.3rem}
.card-sub{font-size:13px;color:#999;margin-bottom:1.75rem;line-height:1.4}

.field{margin-bottom:1.1rem}
.field label{
  display:block;font-size:11px;color:#555;margin-bottom:7px;
  font-weight:700;text-transform:uppercase;letter-spacing:.06em;
}
.field input{
  width:100%;padding:11px 14px;
  border:1.5px solid #ebebeb;border-radius:12px;
  font-size:14px;outline:none;background:#f9f9fb;
  transition:all .15s;font-family:inherit;color:#1a1a1a;
}
.field input:focus{
  border-color:#1649b8;background:white;
  box-shadow:0 0 0 4px rgba(22,73,184,0.1);
}
.field input::placeholder{color:#bbb}

.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#1649b8 0%,#1e5cd4 100%);
  color:white;border:none;border-radius:13px;
  font-size:15px;font-weight:600;cursor:pointer;
  margin-top:.6rem;transition:all .18s;
  font-family:inherit;letter-spacing:.01em;
  box-shadow:0 4px 16px rgba(22,73,184,0.3);
}
.btn-login:hover{
  background:linear-gradient(135deg,#1240a8 0%,#1649b8 100%);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(22,73,184,0.4);
}
.btn-login:active{transform:translateY(0);box-shadow:0 2px 8px rgba(22,73,184,0.2)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.error{
  background:#fff2f2;color:#c0392b;
  padding:10px 14px;border-radius:10px;
  font-size:13px;margin-top:1rem;display:none;
  border:1px solid #fcc;
}
.loading-msg{text-align:center;color:#999;font-size:13px;margin-top:1rem;display:none}

.card-divider{height:1px;background:linear-gradient(90deg,transparent,#ebebeb,transparent);margin:1.75rem 0 1.5rem}
.card-footer{text-align:center;font-size:12px;color:#bbb;line-height:1.5}

/* ── Note bas de page ── */
.page-footer{
  text-align:center;font-size:11px;color:rgba(255,255,255,0.38);
  margin-top:1.75rem;position:relative;z-index:1;letter-spacing:.03em;
}
</style>

<script type="module">
import {createClient} from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://ivrdhnlyvfpsduetnwcr.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2cmRobmx5dmZwc2R1ZXRud2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MjAxNzMsImV4cCI6MjA5MjI5NjE3M30.HLxYoEAm5Ag0HN2WoxHFoduG_czA9qryXo7mks-rAC0';
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

document.getElementById('password').addEventListener('keypress',e=>{if(e.key==='Enter')login();});
document.getElementById('email').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('password').focus();});

window.login=async function(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('btn-login');
  const error=document.getElementById('error-msg');
  const loading=document.getElementById('loading');
  if(!email||!password){
    error.style.display='block';
    error.textContent='Merci de remplir tous les champs.';
    return;
  }
  btn.disabled=true;
  error.style.display='none';
  loading.style.display='block';
  const{data,error:authError}=await supabase.auth.signInWithPassword({email,password});
  if(authError){
    error.style.display='block';
    error.textContent='Email ou mot de passe incorrect.';
    btn.disabled=false;loading.style.display='none';
    return;
  }
  const{data:profil}=await supabase.from('profils').select('*').eq('id',data.user.id).single();
  if(!profil){
    error.style.display='block';
    error.textContent='Profil introuvable. Contactez la comptabilité.';
    btn.disabled=false;loading.style.display='none';
    return;
  }
  localStorage.setItem('falret_user',JSON.stringify({
    id:data.user.id,email:data.user.email,
    gem:profil.gem,dossier:profil.dossier,role:profil.role,
    compte:profil.compte,analytique:profil.analytique,journal:profil.journal
  }));
  if(profil.role==='compta')window.location.href='compta.html';
  else if(profil.role==='coordinatrice')window.location.href='coordinatrice.html';
  else window.location.href='gem.html';
};
</script>
